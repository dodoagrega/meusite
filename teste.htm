<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Dodoagrega Resumo Vídeos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

:root{
  --red:#d50000;
  --yellow:#ffcc00;
  --dark:#070707;
  --gray:#141414;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:#000;
  color:#fff;
  font-family:'Montserrat',sans-serif;
}

/* ========================= */
/* NAVBAR */
/* ========================= */

.navbar{
  width:100%;
  background:#000;
  border-bottom:2px solid #1f1f1f;
  position:sticky;
  top:0;
  z-index:999;
}

.nav-content{
  width:95%;
  max-width:1300px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 0;
}

.logo{
  font-size:38px;
  font-weight:900;
  color:#fff;
}

.logo span{
  color:var(--yellow);
}

.nav-menu{
  display:flex;
  gap:30px;
}

.nav-menu a{
  color:#fff;
  text-decoration:none;
  font-weight:700;
  transition:.3s;
}

.nav-menu a:hover{
  color:var(--yellow);
}

.youtube-btn{
  background:var(--red);
  color:#fff;
  padding:12px 22px;
  border-radius:10px;
  text-decoration:none;
  font-weight:800;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
  background:
  linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
  url('img/bg.jpg');

  background-size:cover;
  background-position:center;

  padding:70px 0;
  overflow:hidden;
}

.hero-content{
  width:95%;
  max-width:1300px;
  margin:auto;

  display:grid;
  grid-template-columns:1fr 500px;
  align-items:center;
  gap:40px;
}

.hero-text h1{
  font-family:'Anton',sans-serif;
  font-size:6rem;
  line-height:.95;
  text-transform:uppercase;
  margin-bottom:20px;
}

.hero-text h1 span{
  color:var(--yellow);
}

.hero-text p{
  font-size:1.2rem;
  color:#ddd;
  line-height:1.7;
  max-width:650px;
  margin-bottom:30px;
}

.hero-icons{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.icon-box{
  max-width:180px;
}

.icon-box h3{
  color:var(--yellow);
  margin-bottom:8px;
}

.social-buttons{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.social-buttons a{
  text-decoration:none;
  color:#fff;
  padding:14px 22px;
  border-radius:10px;
  font-weight:800;
}

.youtube{
  background:#d50000;
}

.instagram{
  background:#e1306c;
}

.whatsapp{
  background:#25d366;
}

.hero-image img{
  width:100%;
  display:block;
}

/* ========================= */
/* SECTION */
/* ========================= */

.section{
  width:95%;
  max-width:1300px;
  margin:50px auto;
}

.section-title{
  display:inline-block;
  background:var(--yellow);
  color:#000;
  padding:10px 25px;
  font-weight:900;
  font-size:1.4rem;
  margin-bottom:25px;
  border-radius:8px;
}

/* ========================= */
/* FEATURED VIDEO */
/* ========================= */

.featured{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:30px;
  background:#0f0f0f;
  padding:25px;
  border-radius:20px;
  border:1px solid #222;
}

.featured iframe{
  width:100%;
  height:420px;
  border:none;
  border-radius:15px;
}

.featured-info{
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.featured-info h2{
  font-size:3rem;
  line-height:1;
  margin-bottom:20px;
  font-family:'Anton',sans-serif;
}

.featured-info p{
  color:#ccc;
  line-height:1.7;
  margin-bottom:30px;
}

.watch-btn{
  background:var(--yellow);
  color:#000;
  text-decoration:none;
  padding:16px 28px;
  border-radius:10px;
  width:fit-content;
  font-weight:900;
}

/* ========================= */
/* VIDEO GRID */
/* ========================= */

.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.video-card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  border:1px solid #222;
  transition:.3s;
}

.video-card:hover{
  transform:translateY(-8px);
}

.video-card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.video-card-content{
  padding:15px;
}

.video-card h3{
  font
